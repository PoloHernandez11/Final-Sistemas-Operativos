#!/usr/bin/env bash
# config.conf - Parámetros configurables del proyecto.
# Modifique estos valores según su entorno SIN tocar el código de los scripts.

# ---------- Backup ----------
# Directorio que se desea respaldar
BACKUP_SOURCE_DIR="$HOME/datos_importantes"
# Directorio donde se guardan los archivos .tar.gz generados
BACKUP_DEST_DIR="$HOME/backups"
# Cantidad de días de antigüedad a partir de los cuales un backup se considera "viejo"
BACKUP_RETENTION_DAYS=7

# ---------- Reporte de recursos ----------
# Punto de montaje sobre el que se informa el uso de disco
REPORTE_DISCO_PATH="/"

# ---------- Limpieza de temporales ----------
# Directorios sobre los que se realiza la limpieza de archivos temporales/caché
TEMP_DIRS=(
    "/tmp"
    "$HOME/.cache"
)
# Antigüedad mínima (en días) para que un archivo temporal sea elegible para borrado
TEMP_MIN_ANTIGUEDAD_DIAS=1

# ---------- General ----------
# Directorio donde se guardan todos los logs generados por los scripts
LOG_DIR="$BASE_DIR/logs"
